spring:
  application:
    name: medibridge
  web:
    resources:
      static-locations: classpath:/static/
      
server:
  port: 8080

gemini:
  api:
    key: ${GEMINI_API_KEY}
    model: gemini-1.5-flash
    temperature: 0.1

google:
  maps:
    api:
      key: ${GOOGLE_MAPS_API_KEY}
  cloud:
    project-id: ${GOOGLE_CLOUD_PROJECT_ID}