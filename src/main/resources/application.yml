spring:
  application:
    name: medibridge
  web:
    resources:
      static-locations: classpath:/static/
      
server:
  port: 8080

# Google Cloud Configuration
google:
  cloud:
    project-id: ${GOOGLE_CLOUD_PROJECT_ID}
    credentials:
      location: ${GOOGLE_APPLICATION_CREDENTIALS}

gemini:
  api:
    key: ${GEMINI_API_KEY}
    model: gemini-1.5-flash
    temperature: 0.1

maps:
  api:
    key: ${GOOGLE_MAPS_API_KEY}